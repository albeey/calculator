<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Yantramanav:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="calculator">
    <span id="display">
      <!-- <span id="operation">0 - 0</span> -->
      <span id="displayValue">0</span>
      <hr>
    </span>

    <button id="clear-btn" value="clear">c</button>
    <button class="operator-btn" value="/">÷</button>
    <button class="operator-btn" value="*">×</button>
    <button id="backspace-btn" value="backspace">⌫</button>

    <button class="digit-btn" value="7">7</button>
    <button class="digit-btn" value="8">8</button>
    <button class="digit-btn" value="9">9</button>
    <button class="operator-btn" value="-">-</button>

    <button class="digit-btn" value="4">4</button>
    <button class="digit-btn" value="5">5</button>
    <button class="digit-btn" value="6">6</button>
    <button class="operator-btn" value="+">+</button>

    <button class="digit-btn" value="1">1</button>
    <button class="digit-btn" value="2">2</button>
    <button class="digit-btn" value="3">3</button>
    <button id="equals-btn" value="=">=</button>

    <button class="digit-btn" value="0">0</button>
    <button id="decimal-btn" value=".">.</button>
  </div>
  <script src="scripts/script.js"></script>
</body>
</html>
